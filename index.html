<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drug Mafia Lord</title>
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
    }

    #game {
        width: 100vw;
        height: 100vh;
        background: linear-gradient(#222, #000);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    button {
        padding: 15px;
        margin: 10px;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="game">
    <h1>💰 Drug Mafia Lord</h1>
    <p id="status">Starting...</p>

    <button onclick="startGame()">Start Game</button>
    <button onclick="move()">Move</button>
    <button onclick="sell()">Sell</button>
</div>

<script>
let cash = 0;
let location = "Street";

function startGame() {
    document.getElementById("status").innerText =
        "You are on the street. Cash: £" + cash;
}

function move() {
    location = "New Area " + Math.floor(Math.random() * 5);
    update();
}

function sell() {
    let earned = Math.floor(Math.random() * 100);
    cash += earned;
    update("You sold goods for £" + earned);
}

function update(msg="") {
    document.getElementById("status").innerText =
        location + " | Cash: £" + cash + " " + msg;
}
</script>

</body>
</html>

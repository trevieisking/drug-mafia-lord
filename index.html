<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drug Mafia Lord</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

#game {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(#222, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="game">
    <h1>💰 Drug Mafia Lord</h1>
    <p id="status">Click Start</p>

    <button id="startBtn">Start Game</button>
    <button id="moveBtn">Move</button>
    <button id="sellBtn">Sell</button>
</div>

<!-- 👇 SCRIPT MOVED HERE (IMPORTANT) -->
<script>
let cash = 0;
let location = "Street";

const statusText = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const moveBtn = document.getElementById("moveBtn");
const sellBtn = document.getElementById("sellBtn");

startBtn.addEventListener("click", () => {
    statusText.innerText = "You are on the street. Cash: £" + cash;
});

moveBtn.addEventListener("click", () => {
    location = "Area " + Math.floor(Math.random() * 5);
    update();
});

sellBtn.addEventListener("click", () => {
    let earned = Math.floor(Math.random() * 100);
    cash += earned;
    update("Sold for £" + earned);
});

function update(msg = "") {
    statusText.innerText =
        location + " | Cash: £" + cash + " " + msg;
}
</script>

</body>
</html>

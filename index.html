<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drug Mafia Lord</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

#game {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    background: #444;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #666;
}
</style>
</head>

<body>

<div id="game">
    <h1>💰 Drug Mafia Lord</h1>
    <p id="status">Game Ready</p>

    <button onclick="startGame()">Start Game</button>
    <button onclick="move()">Move</button>
    <button onclick="sell()">Sell</button>
</div>

<script>
// GLOBAL = works on GitHub 100%
var cash = 0;
var location = "Street";

function startGame() {
    document.getElementById("status").innerText =
        "You are on the street | Cash: £" + cash;
}

function move() {
    location = "Area " + Math.floor(Math.random() * 5);
    update("Moved");
}

function sell() {
    var earned = Math.floor(Math.random() * 100);
    cash += earned;
    update("Sold £" + earned);
}

function update(msg) {
    document.getElementById("status").innerText =
        location + " | Cash: £" + cash + " | " + msg;
}
</script>

</body>
</html>

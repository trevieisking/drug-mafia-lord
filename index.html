<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drug Mafia Lord</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

#game {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(#222, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

button {
    padding: 15px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="game">
    <h1>💰 Drug Mafia Lord</h1>
    <p id="status">Click Start</p>

    <button id="startBtn">Start Game</button>
    <button id="moveBtn">Move</button>
    <button id="sellBtn">Sell</button>
</div>

<script>
let cash = 0;
let location = "Street";

// Wait until page fully loads
window.onload = function () {

    document.getElementById("startBtn").onclick = function () {
        document.getElementById("status").innerText =
            "You are on the street. Cash: £" + cash;
    };

    document.getElementById("moveBtn").onclick = function () {
        location = "Area " + Math.floor(Math.random() * 5);
        update();
    };

    document.getElementById("sellBtn").onclick = function () {
        let earned = Math.floor(Math.random() * 100);
        cash += earned;
        update("Sold for £" + earned);
    };
};

function update(msg = "") {
    document.getElementById("status").innerText =
        location + " | Cash: £" + cash + " " + msg;
}
</script>

</body>
</html>
